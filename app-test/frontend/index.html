<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JFC E-Commerce</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .card { border: 1px solid #ddd; padding: 1rem; margin: 0.5rem 0; border-radius: 8px; }
    .badge { background: #10b981; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>JFC E-Commerce</h1>
  <p><span class="badge">LIVE</span> Infrastructure deployed with Terraform on AWS</p>
  <div id="products"></div>
  <script>
    fetch('/api/products')
      .then(r => r.json())
      .then(data => {
        document.getElementById('products').innerHTML = data.products.map(p =>
          `<div class="card"><strong>${p.name}</strong> - $${p.price}</div>`
        ).join('');
      })
      .catch(() => {
        document.getElementById('products').innerHTML = '<p>API endpoint: /api/products</p>';
      });
  </script>
</body>
</html>
